    const SECTION_ORDER = ["ropa", "acc", "tec", "figuras", "usa"];
    const EDITOR_FAVORITES = new Set([

      "cyclops-premium-figure",

      "jacket-waxed-chore-cafe",
      "botas-threshold-chelsea-cafe",
      "all-star-blancos",
      "thule-crossover-30l",
      "thule-crossover-20l",
      "edifier-qr30",
      "star-platinum-medicos",
      "imagination-works-luffy",
    ]);
    const PRICE_FILTERS = [
      { id: "all", label: "Todos", match: () => true },
      { id: "under50", label: "< $50", match: (item) => typeof item.price === "number" && item.price < 50 },
      { id: "50to100", label: "$50-$100", match: (item) => typeof item.price === "number" && item.price >= 50 && item.price <= 100 },
      { id: "over100", label: "> $100", match: (item) => typeof item.price === "number" && item.price > 100 },
      { id: "noprice", label: "Sin precio", match: (item) => typeof item.price !== "number" },
    ];

    const Arrow = ({dir="right"}) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{transform: dir==="left" ? "scaleX(-1)" : "none"}}>
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    );
    const External = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 17 17 7M8 7h9v9"/>
      </svg>
    );

    function Hero(){
      const [isSpinning, setIsSpinning] = useState(false);

      return (
        <header className="hero">
          <h1 className="hero-title">
            <span className="title-line">
              WISHLIST
              <button
                className={isSpinning ? "head-button spin" : "head-button"}
                onClick={()=>setIsSpinning(true)}
                onAnimationEnd={()=>setIsSpinning(false)}
                aria-label="Girar cabeza"
              >
                <img
                  className="head-icon"
                  src="cabeza.png"
                  alt=""
                  draggable="false"
                />
              </button>
            </span>
            <span className="javi">de Javi</span>
          </h1>
          <p className="hero-sub">
            Wishlist <b>2026-2028</b>
          </p>
        </header>
      );
    }

    function ProductStage({collection}){
      const [idx, setIdx] = useState(0);
      const [key, setKey] = useState(0);
      const items = collection.items;
      const n = items.length;
      if (!n) {
        return (
          <div className="empty-state">
            <h3>Nada por aquí</h3>
            <p>No hay productos en esta sección con ese filtro de precio.</p>
          </div>
        );
      }
      const activeIdx = idx < n ? idx : 0;
      const item = items[activeIdx];
      const isFavorite = EDITOR_FAVORITES.has(item.id);
      const isFlipada = FLIPADAS.has(item.id);

      useEffect(()=>{ setIdx(0); setKey(k=>k+1); }, [collection.label]);

      const go = (delta) => {
        setIdx(i => (i + delta + n) % n);
        setKey(k => k+1);
      };
      const goTo = (i) => {
        if (i===idx) return;
        setIdx(i);
        setKey(k=>k+1);
      };

      useEffect(()=>{
        const onKey = (e) => {
          if (e.key === "ArrowLeft") go(-1);
          if (e.key === "ArrowRight") go(1);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [n, idx]);

      const touchRef = useRef({x:0,y:0,active:false});
      const onTouchStart = (e)=>{
        const t = e.touches[0];
        touchRef.current = {x: t.clientX, y: t.clientY, active: true};
      };
      const onTouchEnd = (e)=>{
        if (!touchRef.current.active) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchRef.current.x;
        const dy = t.clientY - touchRef.current.y;
        if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
          go(dx < 0 ? 1 : -1);
        }
        touchRef.current.active = false;
      };

      return (
        <>
          <div className="stage" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            <div className="stage-visual">
              <div className="stage-badge">
                <span className="num">{String(activeIdx+1).padStart(2,"0")}</span>
                <span className="of">de {String(n).padStart(2,"0")}</span>
              </div>
              {(isFavorite || isFlipada) && (
                <div className="corner-badges">
                  {isFavorite && <div className="favorite-badge">Favorito del editor</div>}
                  {isFlipada && <div className="flipada-badge">Flipada</div>}
                </div>
              )}
              <div className="product-img-wrap">
                <img
                  key={key + "-img"}
                  className="product-img enter"
                  src={item.img}
                  alt={item.name}
                  draggable="false"
                />
              </div>
            </div>

            <div className="stage-info">
              <div className="info-kicker">{collection.kicker}</div>
              <h3 key={key + "-title"} className="info-title enter">{item.name}</h3>
              {item.disclaimer && (
                <p key={key + "-desc"} className="info-desc enter">{item.blurb}</p>
              )}
              <div className="info-cta">
                {item.url ? (
                  <a className="btn-primary" href={item.url} target="_blank" rel="noopener">
                    Ver en la tienda
                    <External/>
                  </a>
                ) : (
                  <span className="btn-ref">Solo referencia</span>
                )}
              </div>
            </div>
          </div>

          <div className="controls">
            <div className="thumb-strip" role="tablist">
              {items.map((it, i)=>(
                <button
                  key={it.id}
                  className="thumb"
                  aria-selected={i===activeIdx}
                  onClick={()=>goTo(i)}
                  title={it.name}
                >
                  <img src={it.img} alt="" draggable="false" />
                </button>
              ))}
            </div>
            <div className="nav">
              <button className="nav-btn" onClick={()=>go(-1)} aria-label="Anterior"><Arrow dir="left"/></button>
              <button className="nav-btn" onClick={()=>go(1)} aria-label="Siguiente"><Arrow/></button>
            </div>
          </div>
        </>
      );
    }

    function App(){
      const [tab, setTab] = useState("ropa");
      const [priceFilter, setPriceFilter] = useState("all");
      const [showPriceFilters, setShowPriceFilters] = useState(false);
      const coll = COLLECTIONS[tab];
      const activeFilter = PRICE_FILTERS.find((filter) => filter.id === priceFilter) || PRICE_FILTERS[0];
      const filteredColl = {
        ...coll,
        items: coll.items.filter(activeFilter.match),
      };

      return (
        <div className="shell">
          <Hero/>

          <div className="tabs" role="tablist">
            {SECTION_ORDER.map((key)=>{
              const c = COLLECTIONS[key];
              const count = c.items.filter(activeFilter.match).length;
              return (
              <button
                key={key}
                className="tab"
                aria-selected={tab===key}
                onClick={()=>setTab(key)}
              >
                {c.label}
                <span className="tab-count">{count}</span>
              </button>
              );
            })}
          </div>

          <div className="filter-area">
            <button
              className="filter-toggle"
              aria-expanded={showPriceFilters}
              onClick={()=>setShowPriceFilters(open=>!open)}
            >
              Filtros
              <span>{activeFilter.label}</span>
            </button>

            {showPriceFilters && (
              <div className="price-filters" role="tablist" aria-label="Filtro de precio">
                {PRICE_FILTERS.map((filter)=>(
                  <button
                    key={filter.id}
                    className="price-filter"
                    aria-selected={priceFilter===filter.id}
                    onClick={()=>{
                      setPriceFilter(filter.id);
                      setShowPriceFilters(false);
                    }}
                  >
                    {filter.label}
                  </button>
                ))}
              </div>
            )}
          </div>

          <ProductStage key={`${tab}-${priceFilter}`} collection={filteredColl}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
